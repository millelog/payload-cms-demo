services:
  payload:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://payload:payload@postgres:5432/payload
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL:-https://payload.cascadeonline.dev}
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.payload.rule=Host(`payload.cascadeonline.dev`)"
      - "traefik.http.routers.payload.entryPoints=https"
      - "traefik.http.routers.payload.tls=true"
      - "traefik.http.routers.payload.tls.certresolver=letsencrypt"
      - "traefik.http.services.payload.loadbalancer.server.port=3000"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload
      POSTGRES_DB: payload
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
